<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; }
      html, body {
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .mic {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(7, 13, 24, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(193, 95, 60, 0.35);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4), 0 0 12px rgba(193, 95, 60, 0.15);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .mic svg { transition: all 0.3s ease; }
      .mic .bar {
        fill: #8A9BBF;
        transition: fill 0.3s ease;
      }
      .mic.recording {
        background: rgba(193, 95, 60, 0.92);
        border-color: rgba(232, 148, 90, 0.6);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 20px rgba(193, 95, 60, 0.6);
        animation: pulse 1.2s ease-in-out infinite;
      }
      .mic.recording .bar { fill: #E8EDF5; }
      .mic.transcribing {
        background: rgba(254, 188, 46, 0.92);
        border-color: rgba(254, 188, 46, 0.5);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4), 0 0 16px rgba(254, 188, 46, 0.5);
        animation: pulse 1.5s ease-in-out infinite;
      }
      .mic.transcribing .bar { fill: #070D18; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div class="mic" id="mic">
      <svg width="22" height="18" viewBox="0 0 22 18">
        <rect class="bar" x="1"  y="7" width="2.2" height="4"  rx="1.1"/>
        <rect class="bar" x="4.5" y="5" width="2.2" height="8"  rx="1.1"/>
        <rect class="bar" x="8"  y="3" width="2.2" height="12" rx="1.1"/>
        <rect class="bar" x="11.5" y="1" width="2.2" height="16" rx="1.1"/>
        <rect class="bar" x="15" y="3" width="2.2" height="12" rx="1.1"/>
        <rect class="bar" x="18.5" y="5" width="2.2" height="8"  rx="1.1"/>
      </svg>
    </div>
  </body>
</html>
